name: Moonshot campaign integrity

on:
  push:
    branches: [master]
    tags: ["layercake-moonshot-phase*"]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e . pytest
      - run: pytest -q
      - run: python -m layercake.moonshot_campaign verify-all
